// ===== Utilities =====
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); }
function formatDate(d) { const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function getMonday(d) { const dt = new Date(d); const day = dt.getDay() || 7; dt.setDate(dt.getDate() - day + 1); dt.setHours(0,0,0,0); return dt; }
function getWeekNum(d) { const oneJan = new Date(d.getFullYear(), 0, 1); return Math.ceil(((d - oneJan) / 86400000 + oneJan.getDay() + 1) / 7); }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
const WEEKDAYS = ['一','二','三','四','五','六','日'];

function getCatColor(catId) {
  const cat = store.categories.find(c => c.id === catId);
  return cat ? cat.color : '#8E8E93';
}
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ===== Tab Switching =====
function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page' + id).classList.add('active');
  document.querySelectorAll('.tab-item')[{A:0,B:1,C:2,D:3}[id]].classList.add('active');
  if (id === 'A') renderWeekView();
  else if (id === 'B') renderMonthView();
  else if (id === 'C') renderLibView();
  else if (id === 'D') renderDiary();
}

// ===== Modal with Color Picker =====
let modalCallback = null;
let selectedColor = PRESET_COLORS[0];
let selectedCatId = null;

function showModal(title, placeholder, cb, options = {}) {
  document.getElementById('modalTitle').textContent = title;
  const inp = document.getElementById('modalInput');
  inp.placeholder = placeholder || '请输入名称';
  inp.value = options.value || '';
  modalCallback = cb;

  const modal = document.getElementById('modal');
  const colorPicker = document.getElementById('modalColorPicker');
  const modalBody = modal.querySelector('.modal-body');
  
  // 清除旧的section label
  modalBody.querySelectorAll('.modal-section-label').forEach(el => el.remove());
  
  const catPicker = document.getElementById('modalCatPicker');
  if (options.showColorPicker) {
    selectedColor = options.initialColor || PRESET_COLORS[0];
    renderColorPicker(colorPicker, selectedColor);
    colorPicker.style.display = 'flex';
    const nameLabel = document.createElement('div');
    nameLabel.className = 'modal-section-label';
    nameLabel.textContent = '分类名称';
    inp.parentNode.insertBefore(nameLabel, inp);
  } else {
    colorPicker.style.display = 'none';
  }
  if (options.showCategoryPicker) {
    selectedCatId = options.initialCatId || (store.categories.find(c => c.id !== 'cat_draft')?.id || store.categories[0]?.id);
    renderCatPicker(catPicker, selectedCatId);
    catPicker.style.display = 'flex';
    const catLabel = document.createElement('div');
    catLabel.className = 'modal-section-label';
    catLabel.textContent = '选择分类';
    inp.parentNode.insertBefore(catLabel, inp);
  } else {
    catPicker.style.display = 'none';
  }

  modal.classList.add('show');
  setTimeout(() => inp.focus(), 100);
}

function renderColorPicker(container, currentColor) {
  let html = '<div class="modal-section-label">选择颜色</div>';
  PRESET_COLORS.forEach(c => {
    const sel = c === currentColor ? ' selected' : '';
    html += `<div class="color-swatch${sel}" style="background:${c}" data-color="${c}" onclick="selectColor(this,'${c}')"></div>`;
  });
  html += `<div class="custom-color-wrap">
    <input type="color" class="custom-color-input" value="${currentColor}" onchange="selectColorFromCustom(this.value)" title="自定义颜色">
  </div>`;
  container.innerHTML = html;
}

function selectColor(el, color) {
  selectedColor = color;
  document.querySelectorAll('#modalColorPicker .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function selectColorFromCustom(color) {
  selectedColor = color;
  document.querySelectorAll('#modalColorPicker .color-swatch').forEach(s => s.classList.remove('selected'));
}

function renderCatPicker(container, currentCatId) {
  let html = '';
  store.categories.filter(c => c.id !== 'cat_draft').forEach(cat => {
    const sel = cat.id === currentCatId ? ' selected' : '';
    html += `<div class="cat-picker-item${sel}" data-catid="${cat.id}" onclick="selectCat(this,'${cat.id}')">
      <div class="cat-dot" style="background:${cat.color}"></div>
      <span class="cat-name">${cat.name}</span>
    </div>`;
  });
  container.innerHTML = html;
}

function selectCat(el, catId) {
  selectedCatId = catId;
  document.querySelectorAll('#modalCatPicker .cat-picker-item').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function closeModal() { const m = document.getElementById('modal'); m.classList.remove('show'); modalCallback = null; }
function confirmModal() {
  const v = document.getElementById('modalInput').value.trim();
  if (v && modalCallback) {
    const colorPicker = document.getElementById('modalColorPicker');
    const catPicker = document.getElementById('modalCatPicker');
    const hasColor = colorPicker.style.display !== 'none';
    const hasCat = catPicker.style.display !== 'none';
    if (hasColor && hasCat) {
      modalCallback(v, selectedColor, selectedCatId);
    } else if (hasColor) {
      modalCallback(v, selectedColor);
    } else if (hasCat) {
      modalCallback(v, null, selectedCatId);
    } else {
      modalCallback(v);
    }
  }
  closeModal();
}

// ===== Page A: Week View =====
let currentWeekOffset = 0;
let weekTouchStartX = 0;
let weekTouchEndX = 0;

function getWeekStart() { const d = getMonday(new Date()); d.setDate(d.getDate() + currentWeekOffset * 7); return d; }

function changeWeek(dir) {
  const container = document.getElementById('weekDays');
  const title = document.getElementById('weekTitle');
  // Slide out horizontally
  container.classList.add(dir > 0 ? 'slide-out-left' : 'slide-out-right');
  title.style.transition = 'opacity .08s ease';
  title.style.opacity = '0';
  setTimeout(() => {
    currentWeekOffset += dir;
    renderWeekView();
    // renderWeekView 会通过 cloneNode 替换容器，需重新获取
    const newContainer = document.getElementById('weekDays');
    newContainer.classList.add(dir > 0 ? 'slide-in-prepare-left' : 'slide-in-prepare-right');
    void newContainer.offsetHeight;
    newContainer.classList.remove('slide-in-prepare-left', 'slide-in-prepare-right');
    title.style.opacity = '1';
  }, 120);
}

// Touch swipe handling for week view (左侧日期区域 only)
// 注意：事件绑定在 initWeekTagDrag() 中，因为该函数会 cloneNode 替换容器

function handleWeekSwipe() {
  const deltaX = weekTouchStartX - weekTouchEndX;
  if (Math.abs(deltaX) > 50) {
    if (deltaX > 0) changeWeek(1);  // Swipe left = next week
    else changeWeek(-1);             // Swipe right = prev week
  }
}

function renderWeekView() {
  const ws = getWeekStart();
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const wn = getWeekNum(ws);
  document.getElementById('weekTitle').textContent = `${wn}周`;
  document.getElementById('weekDateSub').textContent = `${ws.getMonth()+1}/${ws.getDate()} - ${we.getMonth()+1}/${we.getDate()}`;

  const container = document.getElementById('weekDays');
  container.innerHTML = '';
  const todayStr = formatDate(new Date());

  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(d.getDate() + i);
    const ds = formatDate(d);
    const assigned = store.assignments[ds] || [];
    const isToday = ds === todayStr;
    const weekLabel = '周' + WEEKDAYS[i];

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' is-today' : '');
    cell.dataset.date = ds;
    cell.ondragover = e => { e.preventDefault(); cell.classList.add('drag-over'); };
    cell.ondragleave = () => cell.classList.remove('drag-over');
    cell.ondrop = e => { e.preventDefault(); cell.classList.remove('drag-over'); handleDrop(ds, e); };

    let tagsHtml = '';
    assigned.forEach((tid, idx) => {
      const todo = store.todos.find(t => t.id === tid);
      if (todo) {
        const color = getCatColor(todo.catId);
        const doneClass = todo.done ? ' done' : '';
        tagsHtml += `<span class="todo-tag${doneClass}" data-tid="${tid}" data-date="${ds}" data-idx="${idx}" draggable="true" ondragstart="event.dataTransfer.setData('text/plain',JSON.stringify({tid:'${tid}',srcDate:'${ds}'}));event.dataTransfer.effectAllowed='move';showRemoveZone()" ondragend="hideRemoveZone()" onclick="event.stopPropagation();toggleTodo('${tid}')"><span class="dot" style="background:${color}"></span>${escapeHtml(todo.title)}</span>`;
      }
    });

    cell.innerHTML = `
      <div class="day-cell-header">
        <span class="weekday-label">${weekLabel}</span>
        <span class="date-label${isToday ? ' date-label-today' : ''}">${d.getMonth()+1}/${d.getDate()}</span>
      </div>
      <div class="todo-tags">${tagsHtml}</div>`;
    container.appendChild(cell);
  }

  renderWeekPanel();
  initWeekTagDrag();
}

// ===== 左侧 Todo 触摸拖拽 =====
let weekDrag = { active: false, timer: null, tid: null, srcDate: null, startX: 0, startY: 0, ghost: null, insertTarget: null, insertBefore: null, returnToPool: false, removeToDraft: false };

// ===== Remove Zone Helpers =====
function isOverRemoveZone(x, y) {
  const rz = document.getElementById('removeZone');
  if (!rz) return false;
  const r = rz.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}
function showRemoveZone() { document.getElementById('removeZone')?.classList.add('active'); }
function hideRemoveZone() {
  const rz = document.getElementById('removeZone');
  if (rz) { rz.classList.remove('active', 'hover'); }
}
function removeFromScheduleToDraft(tid, srcDate) {
  pushUndo();
  // Remove from assignments
  if (srcDate && store.assignments[srcDate]) {
    store.assignments[srcDate] = store.assignments[srcDate].filter(id => id !== tid);
    if (store.assignments[srcDate].length === 0) delete store.assignments[srcDate];
  }
  // Move to draft category
  const todo = store.todos.find(t => t.id === tid);
  if (todo) { todo.catId = DRAFT_CAT_ID; todo.done = false; }
  save();
  renderWeekView();
  showToast('已移至草稿箱');
}

function handleRemoveZoneDesktopDrop(e) {
  const raw = e.dataTransfer.getData('text/plain');
  if (!raw) return;
  let tid, srcDate;
  try {
    const parsed = JSON.parse(raw);
    tid = parsed.tid;
    srcDate = parsed.srcDate;
  } catch(err) {
    tid = raw; // from right side drag, only tid
  }
  if (!tid) return;
  // Remove from all assignments
  if (srcDate && store.assignments[srcDate]) {
    store.assignments[srcDate] = store.assignments[srcDate].filter(id => id !== tid);
    if (store.assignments[srcDate].length === 0) delete store.assignments[srcDate];
  } else {
    // From right side: remove from all assignments
    Object.keys(store.assignments).forEach(k => {
      store.assignments[k] = store.assignments[k].filter(id => id !== tid);
      if (store.assignments[k].length === 0) delete store.assignments[k];
    });
  }
  const todo = store.todos.find(t => t.id === tid);
  if (todo) { todo.catId = DRAFT_CAT_ID; todo.done = false; }
  save();
  renderWeekView();
  showToast('已移至草稿箱');
}

function initWeekTagDrag() {
  const container = document.getElementById('weekDays');
  
  // 清除旧事件（重新渲染时会重新绑定）
  const newContainer = container.cloneNode(false);
  while (container.firstChild) newContainer.appendChild(container.firstChild);
  container.parentNode.replaceChild(newContainer, container);
  
  // 清除 cloneNode 可能复制的动画 class，避免新容器不可见
  newContainer.classList.remove('slide-out-up', 'slide-out-down', 'slide-in-prepare-up', 'slide-in-prepare-down', 'slide-out-left', 'slide-out-right', 'slide-in-prepare-left', 'slide-in-prepare-right');
  
  // 重新绑定滑动切周事件（左右滑动切换周）
  newContainer.addEventListener('touchstart', function(e) {
    weekTouchStartX = e.touches[0].clientX;
  }, {passive: true});
  newContainer.addEventListener('touchend', function(e) {
    if (weekDrag.active) return; // 拖拽中不触发滑动切周
    weekTouchEndX = e.changedTouches[0].clientX;
    handleWeekSwipe();
  }, {passive: true});
  newContainer.addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY > 0) changeWeek(1);
    else changeWeek(-1);
  }, {passive: false});
  
  newContainer.addEventListener('touchstart', function(e) {
    const tag = e.target.closest('.todo-tag');
    if (!tag) return;
    
    const touch = e.touches[0];
    weekDrag.startX = touch.clientX;
    weekDrag.startY = touch.clientY;
    weekDrag.tid = tag.dataset.tid;
    weekDrag.srcDate = tag.dataset.date;
    
    weekDrag.timer = setTimeout(() => {
      weekDrag.active = true;
      tag.classList.add('week-dragging');
      
      const todo = store.todos.find(t => t.id === weekDrag.tid);
      const color = todo ? getCatColor(todo.catId) : '#999';
      const ghost = document.createElement('div');
      ghost.className = 'week-drag-ghost';
      ghost.style.background = color;
      ghost.textContent = todo ? todo.title : '';
      ghost.style.left = touch.clientX + 'px';
      ghost.style.top = touch.clientY + 'px';
      document.body.appendChild(ghost);
      weekDrag.ghost = ghost;
      
      if (navigator.vibrate) navigator.vibrate(30);
      showRemoveZone();
    }, 350);
  }, { passive: true });
  
  newContainer.addEventListener('touchmove', function(e) {
    if (!weekDrag.active) {
      const touch = e.touches[0];
      const dx = Math.abs(touch.clientX - weekDrag.startX);
      const dy = Math.abs(touch.clientY - weekDrag.startY);
      if (dx > 10 || dy > 10) clearTimeout(weekDrag.timer);
      return;
    }
    
    e.preventDefault();
    e.stopPropagation();
    const touch = e.touches[0];
    
    // 移动 ghost
    if (weekDrag.ghost) {
      weekDrag.ghost.style.left = touch.clientX + 'px';
      weekDrag.ghost.style.top = touch.clientY + 'px';
    }
    
    // 检测目标 cell 和插入位置
    const targetCell = getDayCellAtPoint(touch.clientX, touch.clientY);
    
    // 清除旧高亮和插入指示
    document.querySelectorAll('#weekDays .day-cell.drop-target').forEach(c => c.classList.remove('drop-target'));
    document.querySelectorAll('#weekDays .todo-tag.drag-insert-before').forEach(t => t.classList.remove('drag-insert-before'));
    
    // 检测是否在移除区域
    const overRemove = isOverRemoveZone(touch.clientX, touch.clientY);
    const rz = document.getElementById('removeZone');
    if (overRemove) { rz?.classList.add('hover'); weekDrag.removeToDraft = true; }
    else { rz?.classList.remove('hover'); weekDrag.removeToDraft = false; }
    
    if (targetCell && !overRemove) {
      targetCell.classList.add('drop-target');
      weekDrag.returnToPool = false;
      const panel = document.getElementById('weekPanel');
      if (panel) panel.classList.remove('pool-drop-target');
      
      // 计算插入位置：被拖的 tag 已消失，其余 tag 自然排列
      const tagsContainer = targetCell.querySelector('.todo-tags');
      if (tagsContainer) {
        const tags = Array.from(tagsContainer.querySelectorAll('.todo-tag:not(.week-dragging)'));
        let insertIdx = tags.length; // 默认插到末尾
        
        // 二维判断：Y 确定行，X 确定左右
        for (let i = 0; i < tags.length; i++) {
          const r = tags[i].getBoundingClientRect();
          
          // 手指在 tag 上方 → 插在这个 tag 之前
          if (touch.clientY < r.top) {
            insertIdx = i;
            break;
          }
          
          // 手指在 tag 的垂直范围内
          if (touch.clientY <= r.bottom) {
            if (touch.clientX < r.left + r.width * 0.5) {
              // 手指在 tag 的左半 → 插在这个 tag 之前
              insertIdx = i;
            } else {
              // 手指在 tag 的右半 → 插在这个 tag 之后
              insertIdx = i + 1;
            }
            break;
          }
        }
        
        // 在插入点处的 tag 上方显示蓝色指示线
        document.querySelectorAll('#weekDays .todo-tag.drag-insert-before').forEach(t => t.classList.remove('drag-insert-before'));
        if (insertIdx < tags.length) {
          tags[insertIdx].classList.add('drag-insert-before');
        }
        
        weekDrag.insertTarget = targetCell.dataset.date;
        weekDrag.insertBefore = insertIdx < tags.length ? tags[insertIdx].dataset.tid : null;
      }
    } else {
      weekDrag.insertTarget = null;
      weekDrag.insertBefore = null;
      if (!overRemove) {
        // 检测是否拖到右侧待办池区域
        const panel = document.getElementById('weekPanel');
        if (panel) {
          const pr = panel.getBoundingClientRect();
          if (touch.clientX >= pr.left && touch.clientX <= pr.right && touch.clientY >= pr.top && touch.clientY <= pr.bottom) {
            weekDrag.returnToPool = true;
            panel.classList.add('pool-drop-target');
          } else {
            weekDrag.returnToPool = false;
            panel.classList.remove('pool-drop-target');
          }
        }
      } else {
        const panel = document.getElementById('weekPanel');
        if (panel) panel.classList.remove('pool-drop-target');
      }
    }
  }, { passive: false });
  
  newContainer.addEventListener('touchend', function(e) {
    clearTimeout(weekDrag.timer);
    
    if (!weekDrag.active) {
      weekDrag.tid = null;
      return;
    }
    
    const tid = weekDrag.tid;
    const srcDate = weekDrag.srcDate;
    const targetDate = weekDrag.insertTarget;
    const beforeTid = weekDrag.insertBefore;
    
    const returnToPool = weekDrag.returnToPool;
    const removeToDraft = weekDrag.removeToDraft;
    
    // 先清理视觉状态
    cleanupDrag();
    hideRemoveZone();
    
    // 执行移动
    if (removeToDraft) {
      removeFromScheduleToDraft(tid, srcDate);
    } else if (returnToPool) {
      // 拖回右侧待办池：从当天移除分配
      if (srcDate && store.assignments[srcDate]) {
        store.assignments[srcDate] = store.assignments[srcDate].filter(id => id !== tid);
        if (store.assignments[srcDate].length === 0) delete store.assignments[srcDate];
        save();
        showToast('已归还待办池');
      }
      renderWeekView();
    } else if (targetDate) {
      moveTodoInWeek(tid, srcDate, targetDate, beforeTid);
    }
  }, { passive: true });
  
  newContainer.addEventListener('touchcancel', function() {
    clearTimeout(weekDrag.timer);
    cleanupDrag();
    hideRemoveZone();
  }, { passive: true });

  // ===== 双击日期卡片新建日程 =====
  let lastDblTapTime = 0, lastDblTapCell = null;
  newContainer.addEventListener('touchend', function(e) {
    const cell = e.target.closest('.day-cell');
    if (!cell || e.target.closest('.todo-tag')) { lastDblTapTime = 0; lastDblTapCell = null; return; }
    const now = Date.now();
    if (lastDblTapCell === cell && now - lastDblTapTime < 350) {
      lastDblTapTime = 0; lastDblTapCell = null;
      if (navigator.vibrate) navigator.vibrate(30);
      showAddTodoForDate(cell.dataset.date);
      e.preventDefault();
    } else {
      lastDblTapTime = now; lastDblTapCell = cell;
    }
  });
  // 桌面端双击
  newContainer.addEventListener('dblclick', function(e) {
    const cell = e.target.closest('.day-cell');
    if (!cell || e.target.closest('.todo-tag')) return;
    showAddTodoForDate(cell.dataset.date);
  });
}

function cleanupDrag() {
  if (weekDrag.ghost) { weekDrag.ghost.remove(); weekDrag.ghost = null; }
  document.querySelectorAll('#weekDays .todo-tag.week-dragging').forEach(t => t.classList.remove('week-dragging'));
  document.querySelectorAll('#weekDays .day-cell.drop-target').forEach(c => c.classList.remove('drop-target'));
  document.querySelectorAll('#weekDays .todo-tag.drag-insert-before').forEach(t => t.classList.remove('drag-insert-before'));
  const panel = document.getElementById('weekPanel');
  if (panel) panel.classList.remove('pool-drop-target');
  weekDrag.active = false;
  weekDrag.insertTarget = null;
  weekDrag.insertBefore = null;
  weekDrag.returnToPool = false;
}

function showAddTodoForDate(date) {
  if (!store.categories.length || store.categories.filter(c => c.id !== 'cat_draft').length === 0) { showToast('请先在 Todo 库创建分类'); return; }
  showModal('新建日程 - ' + date, '输入日程内容', (name, _color, catId) => {
    pushUndo();
    const finalCatId = catId || store.categories.find(c => c.id !== 'cat_draft')?.id || store.categories[0].id;
    const catMinOrder = store.todos.filter(t => t.catId === finalCatId).reduce((m, t) => Math.min(m, t.order), 0);
    const newTodo = { id: uid(), title: name, catId: finalCatId, done: false, order: catMinOrder - 1 };
    store.todos.push(newTodo);
    if (!store.assignments[date]) store.assignments[date] = [];
    store.assignments[date].push(newTodo.id);
    save();
    renderWeekView();
    const catName = store.categories.find(c => c.id === finalCatId)?.name || '';
    showToast('已添加到 ' + date + (catName ? '（' + catName + '）' : ''));
  }, { showCategoryPicker: true });
}

function getDayCellAtPoint(x, y) {
  const cells = document.querySelectorAll('#weekDays .day-cell');
  for (const cell of cells) {
    const r = cell.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return cell;
  }
  return null;
}

function moveTodoInWeek(tid, srcDate, targetDate, beforeTid) {
  // 从源日期移除
  if (store.assignments[srcDate]) {
    store.assignments[srcDate] = store.assignments[srcDate].filter(id => id !== tid);
  }
  // 添加到目标日期
  if (!store.assignments[targetDate]) store.assignments[targetDate] = [];
  
  if (beforeTid) {
    // 插入到指定位置
    const idx = store.assignments[targetDate].indexOf(beforeTid);
    if (idx >= 0) {
      store.assignments[targetDate].splice(idx, 0, tid);
    } else {
      store.assignments[targetDate].push(tid);
    }
  } else {
    // 追加到末尾
    if (!store.assignments[targetDate].includes(tid)) {
      store.assignments[targetDate].push(tid);
    }
  }
  
  save();
  renderWeekView();
  if (srcDate !== targetDate) showToast('已移动');
}

let poolDrag = { active: false, timer: null, tid: null, startX: 0, startY: 0, ghost: null, srcEl: null };
let _poolDragDocBound = false;

// ===== Right Panel Category Filter =====
function toggleCatFilter() {
  const menu = document.getElementById('catFilterMenu');
  if (menu.classList.contains('show')) { menu.classList.remove('show'); return; }
  const normalCats = store.categories.filter(c => c.id !== DRAFT_CAT_ID);
  let html = '';
  normalCats.forEach(cat => {
    const active = rightSelectedCat === cat.id ? ' active' : '';
    html += `<div class="cat-filter-item${active}" onclick="selectRightCat('${cat.id}')">
      <span>${cat.name}</span>
      <span class="cat-filter-check">✓</span>
    </div>`;
  });
  menu.innerHTML = html;
  menu.classList.add('show');
}

function updateFilterBtnColor(cat) {
  const btn = document.querySelector('.cat-filter-btn');
  if (!btn || !cat) return;
  btn.style.background = cat.color + '22'; // 15% opacity version
  btn.style.color = cat.color;
}

function selectRightCat(catId) {
  rightSelectedCat = catId;
  document.getElementById('catFilterMenu').classList.remove('show');
  const label = document.getElementById('filterLabel');
  const cat = store.categories.find(c => c.id === catId);
  label.textContent = cat ? cat.name : '';
  updateFilterBtnColor(cat);
  renderWeekPanel();
}

document.addEventListener('click', function(e) {
  const menu = document.getElementById('catFilterMenu');
  if (menu && !e.target.closest('.cat-filter-btn') && !menu.contains(e.target)) {
    menu.classList.remove('show');
  }
});

function renderWeekPanel() {
  const panel = document.getElementById('weekPanel');
  panel.innerHTML = '';

  // Auto-select first category if none selected
  const normalCats = store.categories.filter(c => c.id !== DRAFT_CAT_ID);
  if (!rightSelectedCat || !store.categories.find(c => c.id === rightSelectedCat)) {
    rightSelectedCat = normalCats.length ? normalCats[0].id : null;
    const label = document.getElementById('filterLabel');
    if (label && rightSelectedCat) {
      const cat = store.categories.find(c => c.id === rightSelectedCat);
      label.textContent = cat ? cat.name : '全部';
      updateFilterBtnColor(cat);
    }
  }

  // Filter mode: show only selected category (no redundant header, filter btn shows category)
  if (rightSelectedCat) {
    const cat = store.categories.find(c => c.id === rightSelectedCat);
    if (!cat) { renderWeekPanel(); return; }
    const todos = store.todos.filter(t => t.catId === cat.id).sort((a, b) => (a.done - b.done) || (a.order - b.order));
    const wrap = document.createElement('div');
    wrap.className = 'category-todos';
    wrap.style.padding = '8px 14px';
    wrap.innerHTML = `
        ${todos.map(t => {
          const cls = 'todo-item-r' + (t.done ? ' done-item' : '');
          return `<div class="${cls}" draggable="true" ondragstart="handleDragStart(event,'${t.id}')" ondragend="hideRemoveZone()" onclick="toggleTodo('${t.id}')" data-tid="${t.id}">
            <span class="todo-dot"></span><span class="todo-title ${t.done?'done':''}">${escapeHtml(t.title)}</span>
          </div>`;
        }).join('')}
        ${todos.length === 0 ? '<div style="padding:8px 0;color:var(--text2);font-size:13px">该分类暂无待办</div>' : ''}`;
    panel.appendChild(wrap);
    if (!panel._poolDragBound) {
      panel._poolDragBound = true;
      panel.addEventListener('touchstart', function(e) {
        const item = e.target.closest('.todo-item-r');
        if (!item) return;
        const touch = e.touches[0];
        poolDrag.startX = touch.clientX; poolDrag.startY = touch.clientY;
        poolDrag.tid = item.dataset.tid; poolDrag.srcEl = item;
        poolDrag.timer = setTimeout(() => {
          poolDrag.active = true; item.style.opacity = '0.3';
          const todo = store.todos.find(t => t.id === poolDrag.tid);
          const color = todo ? getCatColor(todo.catId) : '#999';
          const ghost = document.createElement('div');
          ghost.className = 'week-drag-ghost'; ghost.style.background = color;
          ghost.textContent = todo ? todo.title : '';
          ghost.style.left = touch.clientX + 'px'; ghost.style.top = touch.clientY + 'px';
          document.body.appendChild(ghost); poolDrag.ghost = ghost;
          if (navigator.vibrate) navigator.vibrate(30); showRemoveZone();
        }, 350);
      }, { passive: true });
    }
    return;
  }

  // All categories grouped
  store.categories.forEach(cat => {
    const todos = store.todos.filter(t => t.catId === cat.id).sort((a, b) => (a.done - b.done) || (a.order - b.order));
    const grp = document.createElement('div');
    grp.className = 'category-group';
    grp.innerHTML = `
      <div class="category-header" onclick="this.querySelector('.arrow').classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')">
        <span class="arrow">▼</span>
        <span class="cat-name" style="color:${cat.color}">${cat.name}</span>
        <span class="cat-count">${todos.length}</span>
      </div>
      <div class="category-todos">
        ${todos.map(t => {
          const cls = 'todo-item-r' + (t.done ? ' done-item' : '');
          return `<div class="${cls}" draggable="true" ondragstart="handleDragStart(event,'${t.id}')" ondragend="hideRemoveZone()" onclick="toggleTodo('${t.id}')" data-tid="${t.id}">
            <span class="todo-dot"></span><span class="todo-title ${t.done?'done':''}">${escapeHtml(t.title)}</span>
          </div>`;
        }).join('')}
      </div>`;
    panel.appendChild(grp);
  });
  
  // Touch 长按拖拽（手机端）- touchstart 绑在 panel，move/end 绑在 document 以支持跨区域拖拽
  if (!panel._poolDragBound) {
  panel._poolDragBound = true;
  panel.addEventListener('touchstart', function(e) {
    const item = e.target.closest('.todo-item-r');
    if (!item) return;
    const touch = e.touches[0];
    poolDrag.startX = touch.clientX;
    poolDrag.startY = touch.clientY;
    poolDrag.tid = item.dataset.tid;
    poolDrag.srcEl = item;
    
    poolDrag.timer = setTimeout(() => {
      poolDrag.active = true;
      item.style.opacity = '0.3';
      
      const todo = store.todos.find(t => t.id === poolDrag.tid);
      const color = todo ? getCatColor(todo.catId) : '#999';
      const ghost = document.createElement('div');
      ghost.className = 'week-drag-ghost';
      ghost.style.background = color;
      ghost.textContent = todo ? todo.title : '';
      ghost.style.left = touch.clientX + 'px';
      ghost.style.top = touch.clientY + 'px';
      document.body.appendChild(ghost);
      poolDrag.ghost = ghost;
      
      if (navigator.vibrate) navigator.vibrate(30);
      showRemoveZone();
    }, 350);
  }, { passive: true });
  } // end panel._poolDragBound
}

// Document 级别的 touchmove/end/cancel，支持从右侧拖到左侧（只绑定一次）
if (!_poolDragDocBound) {
_poolDragDocBound = true;
let _poolRemoveToDraft = false;

document.addEventListener('touchmove', function(e) {
  if (!poolDrag.active) {
    if (!poolDrag.tid) return;
    const touch = e.touches[0];
    const dx = Math.abs(touch.clientX - poolDrag.startX);
    const dy = Math.abs(touch.clientY - poolDrag.startY);
    if (dx > 10 || dy > 10) { clearTimeout(poolDrag.timer); poolDrag.tid = null; }
    return;
  }
  e.preventDefault();
  const touch = e.touches[0];
  if (poolDrag.ghost) {
    poolDrag.ghost.style.left = (touch.clientX - 40) + 'px';
    poolDrag.ghost.style.top = (touch.clientY - 20) + 'px';
  }
  document.querySelectorAll('#weekDays .day-cell.drop-target').forEach(c => c.classList.remove('drop-target'));
  
  // 检测是否在移除区域
  const overRemove = isOverRemoveZone(touch.clientX, touch.clientY);
  const rz = document.getElementById('removeZone');
  if (overRemove) { rz?.classList.add('hover'); _poolRemoveToDraft = true; }
  else { rz?.classList.remove('hover'); _poolRemoveToDraft = false; }
  
  if (!overRemove) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const cell = el.closest('.day-cell');
      if (cell) cell.classList.add('drop-target');
    }
  }
}, { passive: false });

document.addEventListener('touchend', function(e) {
  clearTimeout(poolDrag.timer);
  if (!poolDrag.active) return;
  
  const touch = e.changedTouches[0];
  document.querySelectorAll('#weekDays .day-cell.drop-target').forEach(c => c.classList.remove('drop-target'));
  
  if (_poolRemoveToDraft) {
    // 拖到移除区域：将日程移入草稿箱
    const tid = poolDrag.tid;
    // 从所有 assignments 中移除
    Object.keys(store.assignments).forEach(k => {
      store.assignments[k] = store.assignments[k].filter(id => id !== tid);
      if (store.assignments[k].length === 0) delete store.assignments[k];
    });
    // 移到草稿箱分类
    const todo = store.todos.find(t => t.id === tid);
    if (todo) { todo.catId = DRAFT_CAT_ID; todo.done = false; }
    save();
    showToast('已移至草稿箱');
  } else {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const cell = el.closest('.day-cell');
      if (cell) {
        const targetDate = cell.dataset.date;
        if (targetDate && poolDrag.tid) {
          if (!store.assignments[targetDate]) store.assignments[targetDate] = [];
          if (!store.assignments[targetDate].includes(poolDrag.tid)) {
            store.assignments[targetDate].push(poolDrag.tid);
            save();
            showToast('已安排');
          }
        }
      }
    }
  }
  
  if (poolDrag.ghost) poolDrag.ghost.remove();
  if (poolDrag.srcEl) poolDrag.srcEl.style.opacity = '';
  hideRemoveZone();
  _poolRemoveToDraft = false;
  poolDrag = { active: false, timer: null, tid: null, startX: 0, startY: 0, ghost: null, srcEl: null };
  renderWeekView();
}, { passive: true });

document.addEventListener('touchcancel', function() {
  clearTimeout(poolDrag.timer);
  if (poolDrag.ghost) poolDrag.ghost.remove();
  if (poolDrag.srcEl) poolDrag.srcEl.style.opacity = '';
  hideRemoveZone();
  _poolRemoveToDraft = false;
  poolDrag = { active: false, timer: null, tid: null, startX: 0, startY: 0, ghost: null, srcEl: null };
}, { passive: true });

} // end _poolDragDocBound

function handleDragStart(e, tid) {
  e.dataTransfer.setData('text/plain', tid);
  e.dataTransfer.effectAllowed = 'move';
  const todo = store.todos.find(t => t.id === tid);
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.textContent = todo ? todo.title : '';
  ghost.style.position = 'fixed';
  ghost.style.top = '-100px';
  document.body.appendChild(ghost);
  e.dataTransfer.setDragImage(ghost, 0, 0);
  setTimeout(() => ghost.remove(), 0);
  showRemoveZone();
}

function handleDrop(dateStr, evt) {
  const raw = (evt || window.event).dataTransfer.getData('text/plain');
  if (!raw) return;
  let tid, srcDate;
  try {
    const parsed = JSON.parse(raw);
    tid = parsed.tid;
    srcDate = parsed.srcDate;
  } catch(e) {
    tid = raw; // 右侧拖来的只有 tid
  }
  if (!tid) return;
  // 如果从其他日期拖来，先移除旧分配
  if (srcDate && srcDate !== dateStr && store.assignments[srcDate]) {
    store.assignments[srcDate] = store.assignments[srcDate].filter(id => id !== tid);
    if (store.assignments[srcDate].length === 0) delete store.assignments[srcDate];
  }
  if (!store.assignments[dateStr]) store.assignments[dateStr] = [];
  if (!store.assignments[dateStr].includes(tid)) {
    store.assignments[dateStr].push(tid);
    save();
    showToast(srcDate && srcDate !== dateStr ? '已移动' : '已添加到日程');
  }
  renderWeekView();
}

function handleDropToPool(e) {
  const raw = e.dataTransfer.getData('text/plain');
  if (!raw) return;
  let tid, srcDate;
  try {
    const parsed = JSON.parse(raw);
    tid = parsed.tid;
    srcDate = parsed.srcDate;
  } catch(err) { return; } // 右侧拖来的不能放回右侧
  if (!tid || !srcDate) return;
  // 从当天移除分配
  if (store.assignments[srcDate]) {
    store.assignments[srcDate] = store.assignments[srcDate].filter(id => id !== tid);
    if (store.assignments[srcDate].length === 0) delete store.assignments[srcDate];
    save();
    showToast('已归还待办池');
  }
  renderWeekView();
}

function toggleTodo(tid) {
  const todo = store.todos.find(t => t.id === tid);
  if (!todo) return;
  pushUndo();
  const wasDone = todo.done;
  todo.done = !todo.done;
  if (todo.done) {
    // 标记完成：同步写 completedLog
    const todayStr = formatDate(new Date());
    if (!store.completedLog[todayStr]) store.completedLog[todayStr] = [];
    if (!store.completedLog[todayStr].includes(tid)) store.completedLog[todayStr].push(tid);
  } else {
    // 取消完成：同步清理 completedLog
    Object.keys(store.completedLog).forEach(k => {
      store.completedLog[k] = store.completedLog[k].filter(id => id !== tid);
    });
  }
  save();

  if (todo.done) {
    // Marking as done: update visual in-place, don't re-sort yet
    document.querySelectorAll('[data-tid="' + tid + '"]').forEach(el => {
      const item = el.closest('.todo-item-r, .lib-todo-item');
      if (!item) return;
      item.classList.add('done-item');
      const titleEl = item.querySelector('.todo-title');
      if (titleEl) titleEl.classList.add('done');
    });
    document.querySelectorAll('.todo-tag[data-tid="' + tid + '"]').forEach(el => {
      el.classList.add('done');
    });
  } else {
    // Unmarking done: re-render to move it back to uncompleted section
    renderCurrentPage();
  }
}

// ===== Page B: Month View =====
let currentMonthOffset = 0;
let selectedMonthDay = formatDate(new Date());

function changeMonth(dir) {
  currentMonthOffset += dir;
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + currentMonthOffset;
  const d = new Date(y, m, 1);
  const cy = d.getFullYear(), cm = d.getMonth();
  const todayStr = formatDate(now);
  // If today falls in this month, select today; otherwise select the 1st
  const todayInMonth = now.getFullYear() === cy && now.getMonth() === cm;
  selectedMonthDay = todayInMonth ? todayStr : formatDate(d);
  renderMonthView();
}

// Month Picker
let pickerYear = new Date().getFullYear();
function openMonthPicker() {
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  pickerYear = d.getFullYear();
  renderMonthPicker(d.getMonth());
  document.getElementById('monthPickerOverlay').classList.add('show');
}
function closeMonthPicker() {
  document.getElementById('monthPickerOverlay').classList.remove('show');
}
function pickerChangeYear(dir) {
  pickerYear += dir;
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  renderMonthPicker(d.getMonth());
}
function renderMonthPicker(currentMonth) {
  document.getElementById('monthPickerYear').textContent = pickerYear;
  const grid = document.getElementById('monthPickerGrid');
  grid.innerHTML = '';
  const MONTH_CN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  MONTH_CN.forEach((name, i) => {
    const cell = document.createElement('div');
    cell.className = 'month-picker-cell' + (i === currentMonth && pickerYear === d_getFullYear() ? ' current' : '');
    cell.textContent = name;
    cell.onclick = () => {
      const now = new Date();
      const targetMonths = (pickerYear - now.getFullYear()) * 12 + (i - now.getMonth());
      currentMonthOffset = targetMonths;
      const d = new Date(pickerYear, i, 1);
      const todayStr = formatDate(now);
      const todayInMonth = now.getFullYear() === pickerYear && now.getMonth() === i;
      selectedMonthDay = todayInMonth ? todayStr : formatDate(d);
      renderMonthView();
      closeMonthPicker();
    };
    grid.appendChild(cell);
  });
}
function d_getFullYear() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1).getFullYear();
}
document.getElementById('monthPickerOverlay').addEventListener('click', function(e) {

});

// Swipe gesture for Page B (left/right to change month)
let monthSwipeStartX = null;
let monthSwipeStartY = null;
document.getElementById('pageB').addEventListener('touchstart', function(e) {
  monthSwipeStartX = e.touches[0].clientX;
  monthSwipeStartY = e.touches[0].clientY;
}, {passive: true});
document.getElementById('pageB').addEventListener('touchend', function(e) {
  if (monthSwipeStartX === null) return;
  const dx = e.changedTouches[0].clientX - monthSwipeStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - monthSwipeStartY);
  monthSwipeStartX = null;
  monthSwipeStartY = null;
  // Only trigger if horizontal movement clearly dominates vertical
  if (Math.abs(dx) < 50 || dy > Math.abs(dx) * 0.7) return;
  changeMonth(dx < 0 ? 1 : -1);
}, {passive: true});
// Removed mouse wheel month change to avoid conflict with page scrolling

function renderMonthView() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth() + currentMonthOffset;
  const d = new Date(year, month, 1);
  const cy = d.getFullYear(), cm = d.getMonth();

  // Update compact month header
  document.getElementById('monthTitleMain').textContent = MONTH_NAMES[cm];
  document.getElementById('monthTitleSub').textContent = cy;

  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  WEEKDAYS.forEach(w => { const el = document.createElement('div'); el.className = 'month-weekday'; el.textContent = w; grid.appendChild(el); });

  const firstDay = new Date(cy, cm, 1);
  let startDay = firstDay.getDay() || 7;
  const startDate = new Date(firstDay); startDate.setDate(startDate.getDate() - startDay + 1);
  const todayStr = formatDate(new Date());

  const totalDays = 42;

  for (let i = 0; i < totalDays; i++) {
    const cd = new Date(startDate); cd.setDate(cd.getDate() + i);
    const ds = formatDate(cd);
    const isOther = cd.getMonth() !== cm;
    const isToday = ds === todayStr;
    const isSelected = ds === selectedMonthDay;

    const assignedIds = store.assignments[ds] || [];
    const assignedTodos = assignedIds.map(id => store.todos.find(t => t.id === id)).filter(Boolean);

    const cell = document.createElement('div');
    cell.className = `month-day${isOther ? ' other-month' : ''}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}`;
    cell.onclick = () => { selectedMonthDay = ds; renderMonthView(); };

    let miniHtml = '';
    if (assignedTodos.length > 0) {
      miniHtml = '<div class="mini-todos">';
      const show = assignedTodos.slice(0, 5);
      show.forEach(t => {
        const color = getCatColor(t.catId);
        const doneStyle = t.done ? 'opacity:0.4;text-decoration:line-through;' : '';
        miniHtml += `<span class="mini-tag" style="background:${color};${doneStyle}">${escapeHtml(t.title)}</span>`;
      });
      miniHtml += '</div>';
    }

    const moreBadge = assignedTodos.length > 5 ? `<span class="more-badge">+${assignedTodos.length - 5}</span>` : '';

    cell.innerHTML = `<div class="day-num">${cd.getDate()}</div>${miniHtml}${moreBadge}`;
    grid.appendChild(cell);
  }

  const detail = document.getElementById('monthDetail');
  const assignedIds = store.assignments[selectedMonthDay] || [];
  const assignedTodos = assignedIds.map(id => store.todos.find(t => t.id === id)).filter(Boolean);
  const sd = new Date(selectedMonthDay);
  const isToday = selectedMonthDay === formatDate(new Date());
  let detailHtml = `<h3>${sd.getMonth()+1}月${sd.getDate()}日${isToday ? '（今天）' : ''} 日程 (${assignedTodos.length})</h3>`;
  if (assignedTodos.length) {
    detailHtml += assignedTodos.map(t => {
      const color = getCatColor(t.catId);
      const doneStyle = t.done ? 'text-decoration:line-through;opacity:0.6;' : '';
      return `<div class="detail-todo${t.done ? ' done' : ''}" onclick="toggleTodo('${t.id}')" style="cursor:pointer"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></span><span style="${doneStyle};flex:1">${escapeHtml(t.title)}</span></div>`;
    }).join('');
  } else {
    detailHtml += '<div style="font-size:12px;color:var(--text2);padding:4px 0">暂无日程安排</div>';
  }
  detail.innerHTML = detailHtml;
}

      }, 600);
    });

    el.addEventListener('mouseleave', () => { clearTimeout(libLongPressTimer); });
    el.addEventListener('touchstart', function(e) {
      libLongPressTriggered = false;
      libLongPressTimer = setTimeout(() => {
        libLongPressTriggered = true;
        el.classList.add('longpress-highlight');
        setTimeout(() => el.classList.remove('longpress-highlight'), 300);
        showEditCategoryModal(cat.id);
      }, 600);
    }, {passive: true});
    el.addEventListener('touchend', () => { clearTimeout(libLongPressTimer); });
    el.addEventListener('touchmove', () => { clearTimeout(libLongPressTimer); });

    catList.appendChild(el);
  });

  // Render draft category at the end (fixed, swipe to clear contents)
  if (draftCat) {
    const count = store.todos.filter(t => t.catId === draftCat.id).length;

function renderLibTodos() {
  const list = document.getElementById('libTodoList');
  list.innerHTML = '';
  if (!libSelectedCat) { list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);font-size:14px">请选择一个分类</div>'; return; }

  const todos = store.todos.filter(t => t.catId === libSelectedCat).sort((a, b) => (a.done - b.done) || (a.order - b.order));
  if (!todos.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);font-size:14px">长按空白区域添加 ✨</div>'; return; }

  todos.forEach(t => {
    const color = getCatColor(t.catId);
    const el = document.createElement('div');
    el.className = 'lib-todo-item';
    el.innerHTML = `
      <div class="todo-cat-dot" style="background:${color}"></div>
      <span class="todo-title ${t.done?'done':''}" data-tid="${t.id}">${escapeHtml(t.title)}</span>
      <div class="lib-todo-actions">
        <button class="del-btn" onclick="event.stopPropagation();deleteTodo('${t.id}')">删除</button>
      </div>`;

    // 双击编辑
    const startInlineEdit = () => {
      const currentSpan = el.querySelector('.todo-title');
      if (!currentSpan) return;
      const currentTitle = t.title;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = currentTitle;
      input.className = 'todo-inline-input';
      
      currentSpan.replaceWith(input);
      input.focus();
      input.select();
      
      const finishEdit = () => {
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== currentTitle) {
          t.title = newTitle;
          save();
        }
        const newSpan = document.createElement('span');
        newSpan.className = `todo-title ${t.done?'done':''}`;
        newSpan.dataset.tid = t.id;
        newSpan.textContent = t.title;
        input.replaceWith(newSpan);
      };
      
      input.addEventListener('blur', finishEdit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
      });
    };
    
    // 双击事件委托：点击 .todo-title 时触发原地编辑
    el.addEventListener('dblclick', (e) => {
      if (e.target.classList.contains('todo-title')) {
        e.stopPropagation();
        startInlineEdit();
      }
    });

    // 单击检测（切换完成状态）
    let clickTimer = null;
    el.onclick = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      // 延迟判断是单击还是双击的一部分
      if (clickTimer) {
        clearTimeout(clickTimer);
        clickTimer = null;
        // 第二次点击 = 双击
        startInlineEdit();
      } else {
        clickTimer = setTimeout(() => {
          clickTimer = null;
          if (!libLongPressTriggered) toggleTodo(t.id);
        }, 250);
      }
    };

    let touchStartX = 0;
    el.ontouchstart = e => { touchStartX = e.touches[0].clientX; };
    el.ontouchmove = e => {
      const dx = touchStartX - e.touches[0].clientX;
      if (dx > 40) el.querySelector('.lib-todo-actions').classList.add('show');
      else if (dx < -20) el.querySelector('.lib-todo-actions').classList.remove('show');
    };

    list.appendChild(el);
  });

  // Long press/click on blank area to add todo
  list.onclick = function(e) {
    if (e.target === list && !inlineInputOpen && libSelectedCat) {
      toggleInlineInput();
    }
  };

  // Touch long press on blank area
  let blankPressTimer = null;
  list.ontouchstart = function(e) {
    if (e.target === list && !inlineInputOpen && libSelectedCat) {
      blankPressTimer = setTimeout(() => {
        toggleInlineInput();
      }, 400);
    }
  };
  list.ontouchend = function() { clearTimeout(blankPressTimer); };
  list.ontouchmove = function() { clearTimeout(blankPressTimer); };
}

  const ds = formatDate(diaryDate);

function renderDiaryImages(images) {
  const container = document.getElementById('diaryImages');
  if (!images || images.length === 0) {
    container.innerHTML = '';
    return;
  }
  // 先渲染占位，再异步加载图片数据
  container.innerHTML = images.map((imgRef, idx) => `
    <div class="diary-img-item" data-img-idx="${idx}">
      <img src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23e8e8e8%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2214%22>加载中</text></svg>" alt="diary image" style="background:#f0f0f0">
      <div class="img-delete" onclick="deleteDiaryImage(${idx})">×</div>
    </div>
  `).join('');
  // 异步加载每张图片（带重试，等云端图片下载完成）
  images.forEach(async (imgRef, idx) => {
    let src = imgRef;
    if (imgRef && !imgRef.startsWith('data:')) {
      let data = await imgDB.getImage(imgRef);
      if (!data) {
        // 图片还没下载完，等2秒重试
        for (let retry = 0; retry < 5 && !data; retry++) {
          await new Promise(r => setTimeout(r, 2000));
          data = await imgDB.getImage(imgRef);
        }
      }
      if (data) src = data;
    }
    const item = container.querySelector(`[data-img-idx="${idx}"] img`);
    if (item) item.src = src;
  });
}

function compressImage(file, maxW, quality, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const w = img.width, h = img.height;
      const scale = Math.min(1, maxW / Math.max(w, h));
      const nw = Math.round(w * scale), nh = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = nw; canvas.height = nh;
      canvas.getContext('2d').drawImage(img, 0, 0, nw, nh);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function uploadDiaryImage(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const ds = formatDate(diaryDate);
  if (!store.diary[ds]) store.diary[ds] = { summary: '', notes: '', images: [] };
  if (!store.diary[ds].images) store.diary[ds].images = [];
  const remaining = 9 - store.diary[ds].images.length;
  if (remaining <= 0) { showToast('最多上传9张照片'); input.value = ''; return; }
  const toUpload = files.slice(0, remaining);
  let done = 0;
  toUpload.forEach(file => {
    compressImage(file, 640, 0.7, async function(base64) {
      // 生成唯一 ID，存入 IndexedDB，store 只存 ID
      const imgId = `img_${ds}_${Date.now()}_${done}`;
      await imgDB.putImage(imgId, base64);
      store.diary[ds].images.push(imgId);
      done++;
      if (done === toUpload.length) {
        save();
        renderDiaryImages(store.diary[ds].images);
        showToast(`已上传${done}张照片`);
      }
    });
  });
  input.value = '';
}

function deleteDiaryImage(idx) {
  const ds = formatDate(diaryDate);
  if (!store.diary[ds] || !store.diary[ds].images) return;
  const imgRef = store.diary[ds].images[idx];
  store.diary[ds].images.splice(idx, 1);
  // 如果是 ID 引用，从 IndexedDB 删除
  if (imgRef && !imgRef.startsWith('data:')) {
    imgDB.deleteImage(imgRef);
  }
  save();
  renderDiaryImages(store.diary[ds].images);
  showToast('图片已删除');
}

function saveDiary() {
  const ds = formatDate(diaryDate);
  if (!store.diary[ds]) store.diary[ds] = { summary: '', notes: '', images: [] };
  store.diary[ds].summary = document.getElementById('diarySummary').value;
  store.diary[ds].notes = document.getElementById('diaryNotes').value;
  save();
}

let monthDiaryOffset = 0;

function renderMonthlyDiary() {
  const container = document.getElementById('diaryMonthly');
  const now = new Date();
  const targetDate = new Date(now.getFullYear(), now.getMonth() + monthDiaryOffset, 1);
  const cy = targetDate.getFullYear(), cm = targetDate.getMonth();
  const daysInMonth = new Date(cy, cm + 1, 0).getDate();
  const todayStr = formatDate(new Date());
  
  // 月份标题
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const isCurrentMonth = monthDiaryOffset === 0;
  
  // 统计数据
  let completedCount = 0, diaryDays = 0, totalAssigned = 0, streak = 0, curStreak = 0;
  const dayData = []; // { date, hasDiary, completedCount, total }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(cy, cm, d);
    const ds = formatDate(dt);
    const hasDiary = store.diary[ds] && (store.diary[ds].summary || store.diary[ds].notes);
    const dayAssigned = store.assignments[ds] || [];
    const dayCompleted = dayAssigned.filter(id => { const t = store.todos.find(x => x.id === id); return t && t.done; }).length;
    const dayTotal = (store.assignments[ds] || []).length;
    completedCount += dayCompleted;
    totalAssigned += dayTotal;
    if (hasDiary) diaryDays++;
    dayData.push({ date: ds, day: d, hasDiary, completedCount: dayCompleted, total: dayTotal });
    
    // 计算连续天数（到月末或今天为止）
    if (ds <= todayStr) {
      if (hasDiary || dayCompleted > 0) { curStreak++; streak = Math.max(streak, curStreak); }
      else { curStreak = 0; }
    }
  }
  
  const rate = totalAssigned > 0 ? Math.round(completedCount / totalAssigned * 100) : 0;
  
  // 照片集锦 - 收集当月所有日记照片（图片可能是 ID 引用，需异步加载）
  const photoItems = []; // { src, date, dateLabel, isRef }
  dayData.forEach(dd => {
    const entry = store.diary[dd.date];
    if (entry && entry.images && entry.images.length > 0) {
      entry.images.forEach(img => {
        const isRef = img && !img.startsWith('data:');
        photoItems.push({ src: isRef ? 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23e8e8e8%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2214%22>加载中</text></svg>' : img, ref: isRef ? img : null, date: dd.date, dateLabel: `${cm+1}/${dd.day}` });
      });
    }
  });
  photoItems.reverse(); // 最新的在前面
  _monthPhotos = photoItems; // 供 lightbox 使用
  
  let galleryHtml = '';
  if (photoItems.length > 0) {
    galleryHtml = photoItems.map((p, idx) => `
      <div class="md-gallery-item" onclick="openLightbox(${idx})" data-gallery-idx="${idx}">
        <img src="${p.src}" alt="日记照片" loading="lazy" ${p.ref ? `data-img-ref="${p.ref}"` : ''}>
        <div class="gallery-date">${p.dateLabel}</div>
      </div>`).join('');
  } else {
    galleryHtml = '<div class="md-gallery-empty">本月暂无照片 📷</div>';
  }
  
  // loadGalleryImages 定义为全局，方便 _loadDiaryImages 完成后调用
  // （在下方已定义为全局函数）
  
  // 每日总结列表（倒序）
  const summaries = dayData.filter(dd => store.diary[dd.date]?.summary).reverse();
  let listHtml = '';
  if (summaries.length) {
    listHtml = summaries.map(e => `
      <div class="md-daily-item" onclick="jumpToDiary('${e.date}')">
        <div class="md-daily-date">${cm+1}月${e.day}日</div>
        <div class="md-daily-summary">${store.diary[e.date].summary}</div>
      </div>`).join('');
  } else {
    listHtml = '<div class="md-empty">本月暂无日记 ✍️</div>';
  }
  
  container.innerHTML = `
    <div class="md-header">
      <div class="md-month-nav">
        <button class="md-arrow" onclick="changeMonthDiary(-1)">‹</button>
        <span class="md-month-label">${cy}年 ${monthNames[cm]}</span>
        <button class="md-arrow" onclick="changeMonthDiary(1)" ${isCurrentMonth ? 'style="opacity:0.3;pointer-events:none"' : ''}>›</button>
      </div>
    </div>
    <div class="md-stats">
      <div class="md-stat-card"><div class="md-stat-num">${completedCount}</div><div class="md-stat-label">完成事项</div></div>
      <div class="md-stat-card"><div class="md-stat-num">${diaryDays}</div><div class="md-stat-label">记录天数</div></div>
      <div class="md-stat-card"><div class="md-stat-num">${rate}%</div><div class="md-stat-label">完成率</div></div>
      <div class="md-stat-card"><div class="md-stat-num">${streak}</div><div class="md-stat-label">最长连续</div></div>
    </div>
    <div class="md-gallery">
      <div class="md-gallery-title"><span>照片墙</span><span>${photoItems.length > 0 ? photoItems.length + '张' : ''}</span></div>
      ${photoItems.length > 0 ? '<div class="md-gallery-grid">' + galleryHtml + '</div>' : galleryHtml}
    </div>
    <div class="md-daily-list">
      <div class="md-daily-list-title">每日小结</div>
      ${listHtml}
    </div>`;

  // 异步加载 gallery 中的 ID 引用图片
  loadGalleryImages();
}

// 全局：照片墙图片异步加载（带重试）
let _galleryRetryCount = 0;
async function loadGalleryImages() {
  const refs = document.querySelectorAll('[data-img-ref]');
  if (!refs.length) return;
  
  const results = await Promise.all([...refs].map(async (el) => {
    const ref = el.getAttribute('data-img-ref');
    const data = await imgDB.getImage(ref);
    if (data) {
      el.src = data;
      const idx = parseInt(el.closest('[data-gallery-idx]')?.getAttribute('data-gallery-idx'));
      if (!isNaN(idx) && _monthPhotos[idx]) _monthPhotos[idx].src = data;
      return true;
    }
    return false;
  }));
  
  const missingCount = results.filter(r => !r).length;
  if (missingCount > 0 && _galleryRetryCount < 15) {
    _galleryRetryCount++;
    setTimeout(() => loadGalleryImages(), 3000);
  } else {
    _galleryRetryCount = 0;
  }
}

function changeMonthDiary(delta) {
  monthDiaryOffset += delta;
  if (monthDiaryOffset > 0) monthDiaryOffset = 0;

// Lightbox 预览
let _monthPhotos = [];
let _lbIndex = 0;

function openLightbox(idx) {
  _lbIndex = idx;
  _showLightbox();
}

function _showLightbox() {
  const p = _monthPhotos[_lbIndex];
  if (!p) return;
  let overlay = document.querySelector('.lightbox-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'lightbox-overlay';
    overlay.innerHTML = `
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <div class="lightbox-counter"></div>
      <img class="lightbox-img" src="">
      <div class="lightbox-date"></div>`;
    // 触摸滑动切换
    let sx = 0;
    overlay.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    overlay.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(e.changedTouches[0].clientY - (overlay._sy||0)) * 1.5) {
        if (dx > 0 && _lbIndex > 0) { _lbIndex--; _showLightbox(); }
        else if (dx < 0 && _lbIndex < _monthPhotos.length - 1) { _lbIndex++; _showLightbox(); }
      }
    }, { passive: true });
    overlay.addEventListener('touchstart', e => { overlay._sy = e.touches[0].clientY; }, { passive: true });
    document.body.appendChild(overlay);
  }
  overlay.querySelector('.lightbox-img').src = p.src;
  const [y, m, d] = p.date.split('-');
  overlay.querySelector('.lightbox-date').textContent = `${parseInt(m)}月${parseInt(d)}日`;
  overlay.querySelector('.lightbox-counter').textContent = `${_lbIndex + 1} / ${_monthPhotos.length}`;
}

function closeLightbox() {
  const overlay = document.querySelector('.lightbox-overlay');
  if (overlay) overlay.remove();
}

if (!load()) { initDefaults(); syncLog('system', '初始化默认数据'); } else { syncLog('data', '加载本地数据: ' + store.todos.length + ' 条待办'); }
// 初始化 order 计数器：取现有 todo 的最大 order + 1
_orderCounter = store.todos.reduce((max, t) => Math.max(max, t.order || 0), 0) + 1;

// 修复 completedLog 不一致：done=true 但 log 里没记录的补上
(function fixCompletedLog() {
  const today = formatDate(new Date());
  if (!store.completedLog) store.completedLog = {};
  let fixed = 0;
  store.todos.forEach(t => {
    if (t.done) {
      const hasLog = Object.values(store.completedLog).some(arr => Array.isArray(arr) && arr.includes(t.id));
      if (!hasLog) {
        if (!store.completedLog[today]) store.completedLog[today] = [];
        store.completedLog[today].push(t.id);
        fixed++;
      }
    }
  });
  // 清理 completedLog 中引用了不存在 todo 的记录
  const todoIds = new Set(store.todos.map(t => t.id));
  Object.keys(store.completedLog).forEach(k => {
    const before = store.completedLog[k].length;
    store.completedLog[k] = store.completedLog[k].filter(id => todoIds.has(id));
    if (store.completedLog[k].length !== before) fixed++;
  });
  if (fixed > 0) save();
})();

// 启动时迁移：将 localStorage 中的 base64 图片迁移到 IndexedDB
(async function migrateLocalImages() {
  if (localStorage.getItem('img_migrated') === '1') return;
  let count = 0;
  const diary = store.diary || {};
  for (const date of Object.keys(diary)) {
    const entry = diary[date];
    if (!entry || !entry.images) continue;
    const newImages = [];
    for (let i = 0; i < entry.images.length; i++) {
      const img = entry.images[i];
      if (img && img.startsWith('data:')) {
        const imgId = `img_${date}_${Date.now()}_${i}`;
        await imgDB.putImage(imgId, img);
        newImages.push(imgId);
        count++;
      } else {
        newImages.push(img);
      }
    }
    entry.images = newImages;
  }
  if (count > 0) {
    save();
    console.log(`[Init] Migrated ${count} local images to IndexedDB`);
  }
  localStorage.setItem('img_migrated', '1');
})();

// 【版本检查】代码更新后触发一次刷新，确保加载最新JS逻辑
// 只在代码版本比localStorage记录的更新时才刷新（防止缓存旧代码时循环刷新）
const storedBuild = localStorage.getItem('app_build');
if (storedBuild && storedBuild !== APP_BUILD && APP_BUILD > storedBuild) {
  console.log(`[Init] Code updated (${storedBuild} → ${APP_BUILD}), reloading...`); syncLog('system', '代码更新 ' + storedBuild + ' → ' + APP_BUILD + '，刷新中...');
  localStorage.setItem('app_build', APP_BUILD);
  location.reload();
}
localStorage.setItem('app_build', APP_BUILD);

// 检测本地数据是否为旧版/不完整（standalone PWA 的 localStorage 可能与浏览器隔离）
// 真实数据有 200+ 条 todos，默认模板只有 9 条
const localDataIsStale = store.todos.length < 50;
if (localDataIsStale && store.todos.length > 9) {
  // 部分数据但不完整，也尝试保留
}

ensureDraftCategory();
renderWeekView();
updateUndoBtnState();

// ===== Click outside input to dismiss keyboard =====
(function() {
  document.addEventListener('click', function(e) {
    const modal = document.getElementById('modal');
    if (!modal.classList.contains('show')) return;

    const activeInput = document.activeElement;
    if (activeInput && activeInput.tagName === 'INPUT') {
      if (e.target !== activeInput && !activeInput.contains(e.target)) {
        activeInput.blur();
      }
    }

    if (e.target === modal) {
      const anyInput = modal.querySelector('input:focus');
      if (anyInput) anyInput.blur();
    }
  });
})();

// Cloud sync: pull from GitHub on startup
// 如果本地数据明显不完整（<50条），显示恢复遮罩，强制从云端拉取
function showRestoreOverlay(show, error) {
  const overlay = document.getElementById('restoreOverlay');
  if (!overlay) return;
  if (show) {
    overlay.style.display = 'flex';
    if (error) {
      document.getElementById('restoreIcon').textContent = '❌';
      document.getElementById('restoreTitle').textContent = '数据恢复失败';
      document.getElementById('restoreSub').textContent = error;
      document.getElementById('restoreSpinner').style.display = 'none';
      document.getElementById('restoreRetryBtn').style.display = 'inline-block';
    }
  } else {
    overlay.style.display = 'none';
  }
}

async function manualRestore() {
  showRestoreOverlay(true);
  document.getElementById('restoreIcon').textContent = '☁️';
  document.getElementById('restoreTitle').textContent = '正在从云端恢复数据...';
  document.getElementById('restoreSub').textContent = '请稍候，不要关闭页面';
  document.getElementById('restoreSpinner').style.display = 'block';
  document.getElementById('restoreRetryBtn').style.display = 'none';
  
  try {
    const success = await cloudSync.pull(false);
    if (success && store.todos.length >= 50) {
      ensureDraftCategory();
      save();
      renderCurrentPage();
      updateUndoBtnState();
      showRestoreOverlay(false);
      showToast('数据已恢复 ✓ (' + store.todos.length + '条)');
    } else {
      showRestoreOverlay(true, '云端数据不足，请检查网络后重试');
    }
  } catch(e) {
    showRestoreOverlay(true, '网络错误：' + e.message);
  }
}

if (localDataIsStale) {
  showRestoreOverlay(true);
}
cloudSync.pull(false).then(success => {
  if (success) {
    ensureDraftCategory();
    renderCurrentPage();
    updateUndoBtnState();
    if (localDataIsStale) {
      if (store.todos.length >= 50) {
        save();
        showRestoreOverlay(false);
        showToast('数据已恢复 ✓ (' + store.todos.length + '条)');
        console.log('[Init] Data recovered: ' + store.todos.length + ' todos');
      } else {
        showRestoreOverlay(true, '云端数据不足 (' + store.todos.length + '条)，请联系管理员');
      }
    }
  } else {
    console.warn('[Init] Cloud pull failed');
    if (store.todos.length < 50) {
      showRestoreOverlay(true, '无法连接云端，请检查网络');
    }
  }
}).catch(err => {
  console.warn('[Init] Cloud pull error:', err);
  if (store.todos.length < 50) {
    showRestoreOverlay(true, '网络错误：' + (err.message || '未知'));
  }
});

// Auto-sync: 多重保障确保数据备份到云端
// 1. beforeunload（桌面浏览器可靠）
window.addEventListener('beforeunload', () => {
    syncLog('system', 'beforeunload 触发');
  cloudSync.pushNow();
});
// 2. visibilitychange（iOS 切后台/锁屏时触发，最可靠）
document.addEventListener('visibilitychange', () => {
    syncLog('system', '页面' + (document.hidden ? '隐藏' : '可见'));
  if (document.visibilityState === 'hidden') {
    cloudSync.pushNow();
  }
});
// 3. pagehide（iOS 页面卸载时触发，比 beforeunload 可靠）
window.addEventListener('pagehide', () => {
    syncLog('system', 'pagehide 触发');
  cloudSync.pushNow();
});
// 4. 定时轻量备份：每5分钟一次，距上次操作超过30秒才触发
setInterval(() => {
  if (Date.now() - _lastSaveTime < 30000) return;
  if (!cloudSync._syncing) cloudSync.pushNow().catch(() => {});
}, 5 * 60 * 1000);

// Manual sync function
function manualSync() {
  showToast('正在备份...');
  cloudSync.pushNow().then(() => {
    showToast('已备份到云端 ✓');
  }).catch(() => {
    showToast('备份失败，数据已保存在本地，不会丢失');
  });
}

// Double-click week title to return to current week
function goToCurrentWeek() {
  if (currentWeekOffset === 0) return;
  currentWeekOffset = 0;
  renderWeekView();
}

(function() {
  const title = document.getElementById('weekTitle');
  if (!title) return;
  let lastTap = 0;
  function goHome() {
    if (currentWeekOffset === 0) return;
    currentWeekOffset = 0;
    renderWeekView();
    title.style.transition = 'transform .15s';
    title.style.transform = 'scale(0.95)';
    setTimeout(() => { title.style.transform = 'scale(1)'; }, 150);
  }
  title.addEventListener('dblclick', goHome);
  // Touch double-tap support
  title.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTap < 350) { e.preventDefault(); goHome(); lastTap = 0; }
    else { lastTap = now; }
  });
})();
</script>
<script>
// 注册 Service Worker（network-first策略，确保PWA每次启动都拿到最新代码）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').then(reg => {
    console.log('[SW] Registered, scope:', reg.scope);
    // 检测到新SW时自动激活
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          console.log('[SW] New version available, activating...');
          newWorker.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
  }).catch(err => console.warn('[SW] Registration failed:', err));
}
</script>
